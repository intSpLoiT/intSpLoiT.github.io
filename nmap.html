<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Scan - Nmap Online</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #333;
            padding: 20px;
            border-radius: 8px;
        }
        h1 {
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #555;
            color: #fff;
            background-color: #444;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            background-color: #444;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IP Scan - Nmap Online</h1>
    <input type="text" id="ip" placeholder="Enter IP Address (e.g., 192.168.1.1)" />
    <button onclick="scanIP()">Start Scan</button>
    <div id="scanResult" class="result"></div>
</div>

<script>
    async function scanIP() {
        const ip = document.getElementById("ip").value;
        if (ip === "") {
            alert("Please enter an IP address.");
            return;
        }

        const url = `https://nmap.online/api/v1/scan?target=${ip}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            document.getElementById("scanResult").textContent = JSON.stringify(data, null, 2);
        } catch (error) {
            document.getElementById("scanResult").textContent = "Error fetching scan data.";
        }
    }
</script>

</body>
</html>
