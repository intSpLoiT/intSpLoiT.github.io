<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntSpLoiT Framework Web GUI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            margin: 0;
            padding: 0;
            color: #fff;
        }
        header {
            background-color: #333;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            color: #fff;
            margin: 0;
            font-size: 40px;
        }
        .logo {
            width: 200px;
            margin-top: 20px;
        }
        .download-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .download-btn {
            background-color: #4CAF50;
            color: white;
            font-size: 18px;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .download-btn:hover {
            background-color: #45a049;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        footer {
            background-color: #333;
            padding: 10px;
            text-align: center;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>IntSpLoiT Framework Web GUI</h1>
        <!-- Burada logo olacak. Siz eklemek için logo.png dosyanızın adını belirtin -->
        <img src="{{ url_for('static', filename='logo.png') }}" alt="IntFramework Logo">
    </header>

    <div class="download-section">
        <a href="https://github.com/intSpLoiT/intframework/archive/refs/heads/İntframeworkV4.zip" class="download-btn">Download IntSpLoiT Framework v4</a>
    </div>

    <footer>
        <p>&copy; 2025 IntSpLoiT Framework. All rights reserved.</p>
    </footer>
</body>
</html>
